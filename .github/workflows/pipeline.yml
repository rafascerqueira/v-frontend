name: Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ─── CI ──────────────────────────────────────────────────────────────────────
  ci:
    name: CI — lint · build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm exec biome ci .

      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('src/**') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-
            ${{ runner.os }}-nextjs-

      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_API_URL: https://api.vendinhas.app

  # ─── Deploy ──────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy → VPS
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('src/**') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-
            ${{ runner.os }}-nextjs-

      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

      # Next.js standalone output already bundles its own node_modules.
      # Copy static assets into the standalone tree before syncing.
      - name: Prepare standalone bundle
        run: |
          cp -r .next/static  .next/standalone/.next/static
          cp -r public        .next/standalone/public
          cp ecosystem.config.js .next/standalone/ecosystem.config.js

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known hosts
        run: ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      # Standalone output is self-contained — no install step needed on VPS
      - name: Sync standalone bundle to VPS
        run: |
          rsync -az --delete \
            .next/standalone/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/vendinhas/frontend/

      - name: Reload PM2 on VPS
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} bash -s << 'ENDSSH'
            set -euo pipefail
            cd /var/www/vendinhas/frontend
            mkdir -p logs
            pm2 reload ecosystem.config.js --update-env \
              || pm2 start ecosystem.config.js --env production
          ENDSSH

      - name: Health check
        run: |
          for i in 1 2 3; do
            if curl -sf https://vendinhas.app; then
              echo "Health check passed (attempt $i)"
              exit 0
            fi
            echo "Attempt $i/3 failed — retrying in 15s..."
            sleep 15
          done
          echo "Health check failed"
          exit 1
