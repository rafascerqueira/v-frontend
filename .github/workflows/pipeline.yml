name: Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ─── CI ──────────────────────────────────────────────────────────────────────
  ci:
    name: CI — lint · build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm exec biome ci .

      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('src/**') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-
            ${{ runner.os }}-nextjs-

      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_API_URL: https://api.vendinhas.app

  # ─── Deploy ──────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy → VPS
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('src/**') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-
            ${{ runner.os }}-nextjs-

      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

      # Next.js standalone output already bundles its own node_modules.
      # Copy static assets into the standalone tree before syncing.
      - name: Prepare standalone bundle
        run: |
          cp -r .next/static .next/standalone/.next/static
          cp -r public       .next/standalone/public

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      # Standalone output is self-contained — no install step needed on VPS.
      # Exclude VPS-managed files so --delete does not remove them.
      - name: Sync standalone bundle to VPS
        run: |
          rsync -az --delete \
            --exclude=ecosystem.config.js \
            --exclude=logs/ \
            --exclude=.env \
            -e "ssh -i ~/.ssh/deploy_key" \
            .next/standalone/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/vendinhas/frontend/

      - name: Reload PM2 on VPS
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail
            mkdir -p /var/www/vendinhas/frontend/logs

            # Write ecosystem — no secrets here, safe to manage from CI.
            # Standalone output uses node server.js, not next start.
            cat > /var/www/vendinhas/frontend/ecosystem.config.js << 'EOF'
            module.exports = {
              apps: [{
                name: 'vendinhas-web',
                cwd: '/var/www/vendinhas/frontend',
                script: 'server.js',
                instances: 1,
                exec_mode: 'fork',
                env: {
                  NODE_ENV: 'production',
                  PORT: 3000,
                  HOSTNAME: '0.0.0.0',
                },
                error_file: '/var/log/pm2/vendinhas-web-error.log',
                out_file: '/var/log/pm2/vendinhas-web-out.log',
                merge_logs: true,
                max_memory_restart: '500M',
              }],
            }
            EOF

            pm2 reload /var/www/vendinhas/frontend/ecosystem.config.js --update-env \
              || pm2 start /var/www/vendinhas/frontend/ecosystem.config.js

            pm2 save

      - name: Health check
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            sleep 10
            for i in 1 2 3 4 5; do
              if curl -sf http://localhost:3000; then
                echo "Health check passed (attempt $i)"
                exit 0
              fi
              echo "Attempt $i/5 failed — retrying in 15s..."
              sleep 15
            done
            echo "--- pm2 status ---"
            pm2 status
            echo "--- last 30 lines of vendinhas-web logs ---"
            pm2 logs vendinhas-web --lines 30 --nostream
            echo "Health check failed"
            exit 1
